manifestVersion: 1
id: constant-gluetun
name: 1.0 Gluetun VPN
tagline: Lightweight VPN client with support for multiple providers
icon: https://raw.githubusercontent.com/qdm12/gluetun/master/doc/logo.svg
category: Networking
version: "3.40.3"
description: >-
  Gluetun is a lightweight VPN client written in Go that supports multiple VPN providers
  including ProtonVPN, Windscribe etc. It acts as a VPN gateway for other Docker containers, allowing
  them to route their traffic through the VPN connection.
  
  
  This setup is pre-configured for ProtonVPN WireGuard (France). Other
  containers can route their traffic through Gluetun by using its network stack.
  
  
  Key features:
    - Support for multiple VPN providers (Windscribe, NordVPN, ExpressVPN, etc.)
    - Built-in firewall with kill switch
    - DNS over TLS (DoT) support
    - HTTP proxy server
    - Health monitoring and automatic reconnection
  
  ⚠️ IMPORTANT:
    Before installing, generate a WireGuard config at ProtonVPN and copy the PrivateKey value.
    Add it to exports.sh on your Umbrel after install:
    ~/umbrel/app-data/constant-gluetun/exports.sh
    https://protonvpn.com/support/wireguard-configurations/


  🛠️ SET-UP INSTRUCTIONS
    1. Install Gluetun from the Constant App Store
    2. Stop the app
    3. Edit ~/umbrel/app-data/constant-gluetun/exports.sh and set PROTONVPN_PRIVATE_KEY to your WireGuard PrivateKey
    4. Start the app again
    ⚠️ NOTE: Open Terminal via Settings → Advanced settings, or SSH into your Umbrel.


  Logs:  
    ⚠️ NOTE: To follow the logs of the Gluetun container:
    Please ssh into your umbrel or via the settings icon -> Advanced settings -> Terminal (open)
    - sudo docker logs -f YourID-constant-gluetun_server_1


releaseNotes: >-
  Initial release with ProtonVPN support. Configured to allow other containers
  route through the VPN connection.
