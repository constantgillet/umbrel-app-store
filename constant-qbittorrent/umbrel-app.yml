manifestVersion: 1.1
id: constant-qbittorrent
category: networking
name: qBittorrent
version: "5.2.2"
tagline: Free and reliable P2P Bittorrent client
icon: https://raw.githubusercontent.com/getumbrel/umbrel-apps-gallery/master/qbittorrent/icon.svg
description: >-
  qBittorrent is an open-source software alternative to µTorrent. It's designed to meet the needs of most users while using as little CPU and memory as possible.


  ⚠️ This version routes all traffic through the Constant Gluetun VPN container.


  🛠️ SET-UP INSTRUCTIONS

  1. Install and configure Constant Gluetun VPN first (add your ProtonVPN WireGuard key to exports.sh)
  2. Install qBittorrent
  3. Change the default password after installation (default: admin / adminadmin)
  4. Keep the default download path set to "/downloads" so files appear in your Umbrel downloads folder


  Some additional tips:

  - Please make sure that you do not change the default download path in the app settings. It should remain set to "/downloads" to ensure that your downloads show up in your main Umbrel downloads folder.

  - It is recommended to change the default password for the app after installation.

  - This app comes bundled with two alternative Web UI's: VueTorrent and Nightwalker. To enable them, navigate to tools --> options --> Web UI and select "Use alternative Web UI". In the "Files location" field, enter "/app/vuetorrent" for VueTorrent or "/app/nightwalker" for Nightwalker and then click "Save".

  - qBittorrent downloads torrents over the VPN, not Tor.
releaseNotes: >-
  This update includes WebUI, WebAPI, RSS, startup, and watch folder fixes.

  Highlights:
  - Fixed stale lockfile cleanup when the hostname changes
  - Fixed watched folder path removal behavior
  - Fixed WebUI issues with magnet submissions, global checkbox toggles, Safari table headers, and the properties panel
  - Fixed WebAPI reverse-proxy header handling
  - Fixed RSS smart episode filter and previously matched episode handling

  If you are upgrading from a version before 5.2.0, note that qBittorrent on umbrelOS now uses "/downloads" as the default download path for better compatibility with other apps. Existing torrents may need to be manually moved to the new location.

  Full release notes are available at https://github.com/qbittorrent/qBittorrent/releases/tag/release-5.2.2
developer: qBittorrent
website: https://qbittorrent.org/
dependencies:
  - constant-gluetun
repo: https://github.com/qBittorrent/qBittorrent
support: https://github.com/qBittorrent/qBittorrent/issues
